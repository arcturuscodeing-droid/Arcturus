name: Arcturus Quality Scanner

on:
  schedule:
    # Runs every 6 hours
    - cron: '0 */6 * * *'
  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan-sources:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        run: npm install node-fetch@3

      - name: Run quality scanner
        run: node .github/scripts/quality-scanner.js

      - name: Commit updated quality-data.json
        run: |
          git config user.name  "Arcturus Bot"
          git config user.email "arcturus-bot@users.noreply.github.com"
          git add quality-data.json
          git diff --cached --quiet || git commit -m "chore: update quality-data.json [$(date -u +'%Y-%m-%d %H:%M UTC')]"
          git push
